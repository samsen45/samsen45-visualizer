<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a051b" />
    <title>SAMSEN-45 · Audio-Reactive Visualizer</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!-- WebGL surface -->
    <canvas id="scene"></canvas>

    <!-- Splash / user-gesture gate for the AudioContext -->
    <div id="splash" class="splash">
      <div class="splash__inner">
        <p class="splash__kicker">SAMSEN&nbsp;·&nbsp;45</p>
        <h1 class="splash__title">INITIALIZE SYSTEM</h1>
        <p class="splash__sub">Feed the void with sound. Choose an input source to ignite the vortex.</p>

        <div class="splash__actions">
          <button id="btn-mic" class="btn btn--a" type="button">Use Microphone</button>
          <button id="btn-file" class="btn btn--b" type="button">Load Audio File</button>
        </div>

        <p id="splash-status" class="splash__status" role="status" aria-live="polite"></p>
        <input id="file-input" class="visually-hidden" type="file" accept="audio/*" />
      </div>
    </div>

    <!-- Centered brand caption over the scene -->
    <footer id="brand" class="brand">SAMSEN&nbsp;45 — LIVE</footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
